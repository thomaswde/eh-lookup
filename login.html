<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ExtraHop Product Catalog · Sign In</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 125.8 84.2'><defs><linearGradient id='g' x1='6.72' y1='41.4' x2='118.08' y2='41.4' gradientUnits='userSpaceOnUse'><stop offset='0' stop-color='%23261F63'/><stop offset='.21' stop-color='%23291F63'/><stop offset='.54' stop-color='%2357245B'/><stop offset='.93' stop-color='%237B2854'/></linearGradient></defs><path fill='url(%23g)' d='M41.8,76.8c-5,0-9.7-.9-14-2.7c-4.3-1.8-8-4.2-11.1-7.4c-3.1-3.1-5.6-6.9-7.3-11.2c-1.8-4.3-2.6-9.1-2.6-14.2c0-5.1,.9-9.8,2.6-14.2c1.7-4.3,4.2-8.1,7.3-11.2c3.1-3.1,6.8-5.6,11.1-7.3c4.3-1.7,8.9-2.6,14-2.6H83c5,0,9.7,.9,14,2.7c4.3,1.8,8,4.2,11.1,7.4c3.1,3.1,5.6,6.9,7.3,11.2c1.8,4.3,2.6,9.1,2.6,14.2c0,5.1-.9,9.8-2.6,14.2c-1.7,4.3-4.2,8.1-7.3,11.2c-3.1,3.1-6.8,5.6-11.1,7.3c-4.3,1.7-8.9,2.6-14,2.6H41.8z'/><path fill='%23fff' d='M22.5,22.6h27.1v8.6H32.5V37h14v8.1h-14v6.4h18.3v8.6H22.5V22.6z M59.9,22.6h10v13.8h22.2V22.6h10v37.6h-10V45.5H69.9v14.7h-10V22.6z'/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;0,900;1,400&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   To change the password, generate a new SHA-256 hash and
   update PASS_HASH in the <script> below. Example:
     echo -n "yournewpassword" | sha256sum
   Default password: extrahop2024
   ============================================================ */

:root {
  --eh-sapphire: #261F63;
  --eh-plum:     #7F2854;
  --eh-magenta:  #EC0889;
  --eh-cyan:     #00AAEF;
  --eh-ink:      #15103A;
  --eh-ink-soft: #2C2750;
  --eh-muted:    #6B6880;
  --eh-border:   #E3E1EC;
  --eh-surface:  #FAFAFC;
  --eh-gradient: linear-gradient(135deg, #261F63 0%, #7F2854 100%);
  --shadow-lg:   0 24px 48px -20px rgba(21,16,58,0.5), 0 8px 16px -8px rgba(21,16,58,0.2);
  --radius-md:   10px;
  --radius-lg:   14px;
  --radius-pill: 999px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Source Sans 3', Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--eh-gradient);
  position: relative;
  overflow: hidden;
}

/* Subtle radial glow decoration */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 80%, rgba(236,8,137,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 85% 15%, rgba(0,170,239,0.14) 0%, transparent 55%);
  pointer-events: none;
}

/* Subtle animated orb */
body::after {
  content: '';
  position: fixed;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: rgba(255,255,255,0.025);
  top: -200px;
  right: -200px;
  pointer-events: none;
  animation: drift 18s ease-in-out infinite alternate;
}

@keyframes drift {
  from { transform: translate(0, 0) scale(1); }
  to   { transform: translate(-40px, 60px) scale(1.08); }
}

/* Card */
.login-card {
  position: relative;
  z-index: 1;
  background: var(--eh-surface);
  border-radius: 20px;
  box-shadow: var(--shadow-lg);
  width: 100%;
  max-width: 420px;
  margin: 16px;
  overflow: hidden;
  animation: rise 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
}

@keyframes rise {
  from { opacity: 0; transform: translateY(28px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Card header */
.card-header {
  background: var(--eh-gradient);
  padding: 36px 40px 32px;
  text-align: center;
}

.logo-mark {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
}

.logo-mark svg {
  width: 96px;
  height: auto;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
}

.card-header h1 {
  font-size: 1.35rem;
  font-weight: 700;
  color: #fff;
  letter-spacing: -0.01em;
  line-height: 1.2;
}

.card-header p {
  margin-top: 6px;
  font-size: 0.875rem;
  color: rgba(255,255,255,0.65);
  font-weight: 400;
  letter-spacing: 0.02em;
}

/* Card body */
.card-body {
  padding: 36px 40px 40px;
}

.field-label {
  display: block;
  font-size: 0.78rem;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--eh-muted);
  margin-bottom: 8px;
}

.input-wrap {
  position: relative;
  margin-bottom: 20px;
}

.input-wrap input {
  width: 100%;
  padding: 12px 44px 12px 16px;
  border: 1.5px solid var(--eh-border);
  border-radius: var(--radius-md);
  font-size: 1rem;
  font-family: inherit;
  color: var(--eh-ink);
  background: #fff;
  outline: none;
  transition: border-color 0.15s, box-shadow 0.15s;
}

.input-wrap input:focus {
  border-color: var(--eh-cyan);
  box-shadow: 0 0 0 3px rgba(0,170,239,0.14);
}

.input-wrap input.error {
  border-color: #E8274B;
  box-shadow: 0 0 0 3px rgba(232,39,75,0.12);
}

/* Show/hide toggle */
.toggle-vis {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  padding: 4px;
  cursor: pointer;
  color: var(--eh-muted);
  display: flex;
  align-items: center;
  transition: color 0.15s;
}

.toggle-vis:hover { color: var(--eh-ink-soft); }

.toggle-vis svg { width: 18px; height: 18px; }

/* Error message */
.error-msg {
  font-size: 0.82rem;
  color: #C7193B;
  font-weight: 600;
  margin-top: -12px;
  margin-bottom: 16px;
  min-height: 1.1em;
  opacity: 0;
  transform: translateY(-4px);
  transition: opacity 0.15s, transform 0.15s;
}

.error-msg.visible {
  opacity: 1;
  transform: translateY(0);
}

/* Submit button */
.btn-login {
  width: 100%;
  padding: 13px 24px;
  background: var(--eh-magenta);
  color: #fff;
  border: none;
  border-radius: var(--radius-pill);
  font-family: inherit;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.01em;
  cursor: pointer;
  transition: background 0.15s, transform 0.12s, box-shadow 0.15s;
  box-shadow: 0 4px 14px -4px rgba(236,8,137,0.5);
}

.btn-login:hover:not(:disabled) {
  background: #c80676;
  transform: translateY(-1px);
  box-shadow: 0 6px 18px -4px rgba(236,8,137,0.55);
}

.btn-login:active:not(:disabled) {
  transform: translateY(0);
}

.btn-login:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

/* Shake animation for wrong password */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  15%       { transform: translateX(-6px); }
  30%       { transform: translateX(6px); }
  45%       { transform: translateX(-5px); }
  60%       { transform: translateX(5px); }
  75%       { transform: translateX(-3px); }
  90%       { transform: translateX(3px); }
}

.shake { animation: shake 0.45s cubic-bezier(0.36, 0.07, 0.19, 0.97) both; }

/* Footer note */
.card-footer {
  border-top: 1px solid var(--eh-border);
  padding: 16px 40px;
  text-align: center;
  font-size: 0.78rem;
  color: var(--eh-muted);
}

/* Responsive */
@media (max-width: 480px) {
  .card-header { padding: 28px 28px 24px; }
  .card-body   { padding: 28px 28px 32px; }
  .card-footer { padding: 14px 28px; }
}
</style>
</head>
<body>

<div class="login-card" id="card">
  <div class="card-header">
    <div class="logo-mark">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 125.8 84.2" aria-label="ExtraHop">
        <defs>
          <linearGradient id="ehg" x1="6.72" y1="41.4" x2="118.08" y2="41.4" gradientUnits="userSpaceOnUse">
            <stop offset="0"   stop-color="#4B3F9E"/>
            <stop offset=".54" stop-color="#7A4A80"/>
            <stop offset=".93" stop-color="#9B4A78"/>
          </linearGradient>
        </defs>
        <path fill="url(#ehg)" d="M41.8,76.8c-5,0-9.7-.9-14-2.7c-4.3-1.8-8-4.2-11.1-7.4c-3.1-3.1-5.6-6.9-7.3-11.2c-1.8-4.3-2.6-9.1-2.6-14.2c0-5.1,.9-9.8,2.6-14.2c1.7-4.3,4.2-8.1,7.3-11.2c3.1-3.1,6.8-5.6,11.1-7.3c4.3-1.7,8.9-2.6,14-2.6H83c5,0,9.7,.9,14,2.7c4.3,1.8,8,4.2,11.1,7.4c3.1,3.1,5.6,6.9,7.3,11.2c1.8,4.3,2.6,9.1,2.6,14.2c0,5.1-.9,9.8-2.6,14.2c-1.7,4.3-4.2,8.1-7.3,11.2c-3.1,3.1-6.8,5.6-11.1,7.3c-4.3,1.7-8.9,2.6-14,2.6H41.8z"/>
        <path fill="#fff" d="M22.5,22.6h27.1v8.6H32.5V37h14v8.1h-14v6.4h18.3v8.6H22.5V22.6z M59.9,22.6h10v13.8h22.2V22.6h10v37.6h-10V45.5H69.9v14.7h-10V22.6z"/>
      </svg>
    </div>
    <h1>Product Catalog</h1>
    <p>Stack Builder &amp; Appliance Reference</p>
  </div>

  <div class="card-body">
    <form id="login-form" autocomplete="off" novalidate>
      <label class="field-label" for="password">Access Password</label>
      <div class="input-wrap">
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter password"
          autocomplete="current-password"
          autofocus
          spellcheck="false"
        />
        <button type="button" class="toggle-vis" id="toggle-vis" aria-label="Show password" tabindex="-1">
          <!-- eye icon -->
          <svg id="icon-eye" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <!-- eye-off icon (hidden initially) -->
          <svg id="icon-eye-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>

      <div class="error-msg" id="error-msg" role="alert"></div>

      <button type="submit" class="btn-login" id="submit-btn">Sign In</button>
    </form>
  </div>

  <div class="card-footer">
    Internal tool &mdash; authorized access only
  </div>
</div>

<script>
  // ============================================================
  // PASSWORD CONFIGURATION
  // To change: echo -n "yournewpassword" | sha256sum
  // Current password: peace force rugby charge
  // ============================================================
  const PASS_HASH = 'fa0e71cdd4f97378fd7f3b78b837096e7f5a7048c84649dca83d635fb36d0cf8';
  const SESSION_KEY = 'eh-catalog-auth';

  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }

  const form      = document.getElementById('login-form');
  const input     = document.getElementById('password');
  const errorMsg  = document.getElementById('error-msg');
  const submitBtn = document.getElementById('submit-btn');
  const card      = document.getElementById('card');
  const toggleBtn = document.getElementById('toggle-vis');
  const iconEye    = document.getElementById('icon-eye');
  const iconEyeOff = document.getElementById('icon-eye-off');

  // Show/hide password toggle
  toggleBtn.addEventListener('click', () => {
    const isPassword = input.type === 'password';
    input.type = isPassword ? 'text' : 'password';
    iconEye.style.display    = isPassword ? 'none' : '';
    iconEyeOff.style.display = isPassword ? '' : 'none';
    toggleBtn.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
  });

  // Clear error on input
  input.addEventListener('input', () => {
    input.classList.remove('error');
    errorMsg.textContent = '';
    errorMsg.classList.remove('visible');
  });

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('visible');
    input.classList.add('error');
    // Shake the card
    card.classList.remove('shake');
    void card.offsetWidth; // reflow to restart animation
    card.classList.add('shake');
    input.focus();
    input.select();
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const val = input.value;
    if (!val) {
      showError('Please enter the access password.');
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Checking…';

    try {
      const hash = await sha256(val);
      if (hash === PASS_HASH) {
        sessionStorage.setItem(SESSION_KEY, hash);
        // Redirect — go back to wherever we came from, or index.html
        const dest = new URLSearchParams(location.search).get('next') || 'index.html';
        location.replace(dest);
      } else {
        showError('Incorrect password. Please try again.');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    } catch {
      showError('An error occurred. Please try again.');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign In';
    }
  });

  // If already authenticated, skip login
  if (sessionStorage.getItem(SESSION_KEY) === PASS_HASH) {
    const dest = new URLSearchParams(location.search).get('next') || 'index.html';
    location.replace(dest);
  }
</script>
</body>
</html>
