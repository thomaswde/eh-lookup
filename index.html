<script>
/* ============================================================
   ExtraHop Product Catalog — application logic
   ============================================================ */

// ---- Data ----
// CATALOG is populated from catalog.eh.json at runtime (see bootstrapCatalog below).
// The inline <script id="catalog-json"> block is used as a fallback if fetch fails (e.g., file:// or offline).
let CATALOG = [];

// Platform metadata — display name, accent color, description, stack group
const PLATFORM_META = {
  command:              { label: 'Console',            accent: 'var(--plt-command)',            group: 'Console',              order: 0, short: 'ECA' },
  packet_sensor:        { label: 'Packet Sensor',      accent: 'var(--plt-packet_sensor)',      group: 'Sensors',              order: 1, short: 'EDA' },
  multifunction_sensor: { label: 'Multifunction Sensor',accent: 'var(--plt-multifunction_sensor)',group: 'Sensors',             order: 1, short: 'EDA' },
  all_in_one:           { label: 'All-in-One',         accent: 'var(--plt-all_in_one)',         group: 'Sensors',              order: 1, short: 'AIO' },
  ids_standalone:       { label: 'IDS Standalone',     accent: 'var(--plt-ids_standalone)',     group: 'IDS',                  order: 2, short: 'IDS' },
  packetstore:          { label: 'Packet Store',       accent: 'var(--plt-packetstore)',        group: 'Packet Stores',        order: 3, short: 'ETA' },
  extended_storage:     { label: 'Extended Storage',   accent: 'var(--plt-extended_storage)',   group: 'Extended Storage',     order: 4, short: 'ESU' },
  recordstore:          { label: 'Record Store',       accent: 'var(--plt-recordstore)',        group: 'Record Stores',        order: 5, short: 'EXA' },
  flow_collector:       { label: 'Flow Collector',     accent: 'var(--plt-flow_collector)',     group: 'Flow Collectors',      order: 6, short: 'EFC' },
};

const MODULE_META = {
  ndr:              { label: 'NDR',              color: 'var(--eh-sapphire)',  description: 'Network Detection & Response' },
  npm:              { label: 'NPM',              color: 'var(--eh-cyan)',      description: 'Network Performance Monitoring' },
  ids:              { label: 'IDS',              color: 'var(--eh-tangerine)', description: 'Intrusion Detection'          },
  network_forensics:{ label: 'Forensics',        color: 'var(--eh-plum)',      description: 'Network Forensics / PCAP'     },
  investigation:    { label: 'Investigation',    color: 'var(--eh-magenta)',   description: 'Records / Investigation'      },
  flow_analysis:    { label: 'Flow Analysis',    color: '#7FA800',             description: 'NetFlow / sFlow / IPFIX'      },
};

const DEPLOY_META = {
  physical: { label: 'Physical',   icon: '◼', color: 'var(--eh-sapphire)' },
  vmware:   { label: 'VMware',     icon: 'V', color: '#607078' },
  'hyper-v':{ label: 'Hyper-V',    icon: 'H', color: '#0078D4' },
  kvm:      { label: 'KVM',        icon: 'K', color: '#D8353B' },
  aws:      { label: 'AWS',        icon: 'a', color: '#FF9900' },
  azure:    { label: 'Azure',      icon: '⌁', color: '#0078D4' },
  gcp:      { label: 'GCP',        icon: 'g', color: '#4285F4' },
};

// ---- State ----
const state = {
  search: '',
  filters: { platform: new Set(), modules: new Set(), deployment: new Set() },
  hideEos: false,
  sort: 'platform-group',
  stack: [], // { id, qty }
  stackName: '',
  stackNotes: '',
};

// Load persisted stack if present
try {
  const saved = localStorage.getItem('eh-stack');
  if (saved) {
    const parsed = JSON.parse(saved);
    if (Array.isArray(parsed.stack)) state.stack = parsed.stack;
    if (typeof parsed.name === 'string') state.stackName = parsed.name;
    if (typeof parsed.notes === 'string') state.stackNotes = parsed.notes;
  }
} catch (e) { /* no-op */ }

// Load persisted EOS preference
try {
  state.hideEos = localStorage.getItem('eh-hide-eos') === '1';
} catch (e) { /* no-op */ }

// Stackable / infrastructure classification
const STACKABLE_PLATFORMS = new Set([
  'packet_sensor', 'multifunction_sensor', 'all_in_one',
  'packetstore', 'extended_storage',
  'ids_standalone', 'flow_collector',
]);
const SENSOR_PLATFORMS = new Set([
  'packet_sensor', 'multifunction_sensor', 'all_in_one',
]);
const INFRA_PLATFORMS = new Set([
  'command', 'recordstore',
]);

// ---- Utilities ----
const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

function itemOf(name) {
  return CATALOG.find(x => x.name === name);
}

function prettyStatus(s) {
  return (s || '').replace('_', ' ');
}

// Derived deployment kind — single source of truth for Physical / Virtual / Cloud.
// Rules: form_factor present -> Physical; else hypervisors -> Virtual; else clouds -> Cloud.
// Virtual wins over Cloud when both are listed (cloud is a virtual env anyway).
function deploymentKind(item) {
  if (item.form_factor) return 'Physical';
  if (item.deployments?.hypervisors?.length) return 'Virtual';
  if (item.deployments?.clouds?.length) return 'Cloud';
  return 'Virtual';
}
const isPhysical = item => deploymentKind(item) === 'Physical';

function deploymentKeysFor(item) {
  const keys = [];
  if (isPhysical(item)) keys.push('physical');
  const dep = item.deployments || {};
  (dep.hypervisors || []).forEach(h => keys.push(h));
  (dep.clouds || []).forEach(c => keys.push(c));
  return keys;
}

function deploymentCategories(item) {
  // Rolls up into Physical / Virtual / Cloud
  const out = new Set();
  const kind = deploymentKind(item);
  out.add(kind);
  // Also surface Cloud when an item is virtual but also cloud-capable, so the Cloud filter still catches it.
  if (kind === 'Virtual' && item.deployments?.clouds?.length) out.add('Cloud');
  return out;
}

function moduleKeys(item) {
  return Object.keys(item.modules || {}).filter(k => item.modules[k]);
}

function fmtGbps(v) {
  if (v == null) return '—';
  if (v === 0) return '0';
  if (v >= 1) return v + '';
  return v + '';
}

function fmtNum(v) {
  if (v == null) return '—';
  return v.toLocaleString();
}

function accentForPlatform(platform) {
  return PLATFORM_META[platform] ? PLATFORM_META[platform].accent : 'var(--eh-sapphire)';
}

function computeStorageCapacityTb(item) {
  const cp = item?.storage?.continuous_pcap;
  if (!cp) return 0;
  if (cp.capacity_tb) return cp.capacity_tb;
  if (cp.onboard?.disk_qty && cp.onboard?.disk_size_tb) return cp.onboard.disk_qty * cp.onboard.disk_size_tb;
  if (cp.virtual_disk?.disk_qty && cp.virtual_disk?.disk_size_tb) return cp.virtual_disk.disk_qty * cp.virtual_disk.disk_size_tb;
  return 0;
}

/* ============================================================
   RENDER: Filter popovers
   ============================================================ */

function buildFilterPopovers() {
  // Platforms
  const platforms = [...new Set(CATALOG.map(i => i.platform))].sort(
    (a, b) => (PLATFORM_META[a]?.order ?? 99) - (PLATFORM_META[b]?.order ?? 99)
  );
  $('#pop-platform').innerHTML = platforms.map(p => {
    const meta = PLATFORM_META[p] || { label: p, accent: 'var(--eh-sapphire)' };
    return `<label class="filter-option">
      <input type="checkbox" value="${p}" data-filter="platform" />
      <span class="swatch" style="background:${meta.accent}"></span>
      <span>${meta.label}</span>
    </label>`;
  }).join('');

  // Modules
  const mods = Object.keys(MODULE_META);
  $('#pop-modules').innerHTML = mods.map(m => {
    const meta = MODULE_META[m];
    return `<label class="filter-option">
      <input type="checkbox" value="${m}" data-filter="modules" />
      <span class="swatch" style="background:${meta.color}"></span>
      <span>${meta.label} <small style="color:var(--eh-muted);font-weight:400">— ${meta.description}</small></span>
    </label>`;
  }).join('');

  // Deployment categories
  $('#pop-deployment').innerHTML = ['Physical', 'Virtual', 'Cloud'].map(d => `
    <label class="filter-option">
      <input type="checkbox" value="${d}" data-filter="deployment" />
      <span class="swatch" style="background:${d==='Physical'?'var(--eh-sapphire)':d==='Virtual'?'var(--eh-cyan)':'var(--eh-magenta)'}"></span>
      <span>${d}</span>
    </label>
  `).join('');

  // Wire popovers
  $$('.filter-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const name = btn.dataset.popover;
      const isOpen = btn.classList.contains('open');
      $$('.filter-btn').forEach(b => b.classList.remove('open'));
      $$('.filter-popover').forEach(p => p.classList.remove('open'));
      if (!isOpen) {
        btn.classList.add('open');
        $('#pop-' + name).classList.add('open');
      }
      e.stopPropagation();
    });
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.filter-group')) {
      $$('.filter-btn').forEach(b => b.classList.remove('open'));
      $$('.filter-popover').forEach(p => p.classList.remove('open'));
    }
  });

  // Checkbox wiring
  $$('.filter-option input').forEach(inp => {
    inp.addEventListener('change', () => {
      const set = state.filters[inp.dataset.filter];
      if (inp.checked) set.add(inp.value); else set.delete(inp.value);
      updateFilterCounts();
      renderActiveFilters();
      render();
    });
  });
}

function updateFilterCounts() {
  for (const k of ['platform', 'modules', 'deployment']) {
    const el = $('#ct-' + k);
    const n = state.filters[k].size;
    if (n > 0) { el.textContent = n; el.style.display = ''; }
    else { el.style.display = 'none'; }
  }
}

function renderActiveFilters() {
  const host = $('#active-filters');
  const chips = [];
  for (const [k, set] of Object.entries(state.filters)) {
    for (const v of set) {
      const label =
        k === 'platform' ? (PLATFORM_META[v]?.label || v) :
        k === 'modules' ? (MODULE_META[v]?.label || v) : v;
      chips.push(`<span class="chip" data-k="${k}" data-v="${v}">${label}<button aria-label="remove">×</button></span>`);
    }
  }
  if (state.search) chips.push(`<span class="chip" data-k="search" data-v="">"${state.search}"<button>×</button></span>`);
  host.innerHTML = chips.join('');
  host.querySelectorAll('.chip button').forEach(btn => {
    btn.addEventListener('click', () => {
      const chip = btn.parentElement;
      const k = chip.dataset.k, v = chip.dataset.v;
      if (k === 'search') { state.search = ''; $('#search').value = ''; }
      else {
        state.filters[k].delete(v);
        const box = document.querySelector(`.filter-option input[value="${v}"][data-filter="${k}"]`);
        if (box) box.checked = false;
      }
      updateFilterCounts();
      renderActiveFilters();
      render();
    });
  });
}

/* ============================================================
   FILTER + SORT
   ============================================================ */

function itemMatches(item) {
  if (state.hideEos && item.sale_status === 'end_of_sale') return false;
  const s = state.search.trim().toLowerCase();
  if (s) {
    const hay = [
      item.name, item.platform, String(item.generation || ''),
      JSON.stringify(item.skus || {}), JSON.stringify(item.modules || {}),
      JSON.stringify(item.deployments || {}), item.sale_status || ''
    ].join(' ').toLowerCase();
    if (!hay.includes(s)) return false;
  }
  if (state.filters.platform.size && !state.filters.platform.has(item.platform)) return false;
  if (state.filters.modules.size) {
    const mods = moduleKeys(item);
    for (const need of state.filters.modules) if (!mods.includes(need)) return false;
  }
  if (state.filters.deployment.size) {
    const cats = deploymentCategories(item);
    let ok = false;
    for (const need of state.filters.deployment) if (cats.has(need)) { ok = true; break; }
    if (!ok) return false;
  }
  return true;
}

function sortItems(items) {
  const s = state.sort;
  const copy = items.slice();
  if (s === 'throughput-desc') copy.sort((a, b) => (b.performance?.base_gbps || 0) - (a.performance?.base_gbps || 0));
  else if (s === 'throughput-asc') copy.sort((a, b) => (a.performance?.base_gbps || 0) - (b.performance?.base_gbps || 0));
  else if (s === 'generation-desc') copy.sort((a, b) => (b.generation || 0) - (a.generation || 0) || a.name.localeCompare(b.name));
  else if (s === 'name-asc') copy.sort((a, b) => a.name.localeCompare(b.name));
  else if (s === 'status') copy.sort((a, b) => {
    const rank = x => x === 'active' ? 0 : x === 'end_of_sale' ? 1 : 2;
    return rank(a.sale_status) - rank(b.sale_status) || a.name.localeCompare(b.name);
  });
  else { // platform-group
    copy.sort((a, b) => {
      const pa = PLATFORM_META[a.platform]?.order ?? 99;
      const pb = PLATFORM_META[b.platform]?.order ?? 99;
      if (pa !== pb) return pa - pb;
      // Within a group: physical first, then by throughput desc, then name
      const ap = isPhysical(a), bp = isPhysical(b);
      if (ap !== bp) return ap ? -1 : 1;
      const ta = a.performance?.base_gbps || 0;
      const tb = b.performance?.base_gbps || 0;
      if (ta !== tb) return tb - ta;
      return a.name.localeCompare(b.name);
    });
  }
  return copy;
}

/* ============================================================
   RENDER: Catalog grid
   ============================================================ */

function render() {
  const filtered = CATALOG.filter(itemMatches);
  const sorted = sortItems(filtered);
  $('#result-count').textContent = sorted.length;

  const grid = $('#catalog-grid');
  grid.innerHTML = '';

  if (!sorted.length) {
    grid.innerHTML = `<div class="empty-state"><h3>No matches</h3>Try clearing a filter or widening your search.</div>`;
    return;
  }

  // When grouping, emit group headers
  if (state.sort === 'platform-group') {
    const groups = {};
    for (const item of sorted) {
      const g = PLATFORM_META[item.platform]?.group || 'Other';
      (groups[g] ||= []).push(item);
    }
    const orderedGroups = Object.entries(groups).sort(
      (a, b) => (PLATFORM_META[a[1][0].platform]?.order ?? 99) - (PLATFORM_META[b[1][0].platform]?.order ?? 99)
    );
    for (const [groupName, items] of orderedGroups) {
      const accent = PLATFORM_META[items[0].platform]?.accent || 'var(--eh-sapphire)';
      const header = document.createElement('div');
      header.className = 'group-header';
      header.innerHTML = `
        <div class="group-title"><span class="swatch" style="background:${accent}"></span>${groupName}</div>
        <div class="group-count">${items.length}</div>
        <div class="group-line"></div>`;
      grid.appendChild(header);
      items.forEach(item => grid.appendChild(renderCard(item)));
    }
  } else {
    sorted.forEach(item => grid.appendChild(renderCard(item)));
  }

  renderStack(); // refresh "added" states on cards
}

function renderCard(item) {
  const card = document.createElement('article');
  card.className = 'card';
  card.dataset.id = item.name;
  card.draggable = true;
  const accent = accentForPlatform(item.platform);
  card.style.setProperty('--plt-color', accent);

  const modules = moduleKeys(item);
  const status = item.sale_status || 'unknown';
  const gen = item.generation !== undefined ? `Gen ${item.generation}` : '';
  const virt = deploymentKind(item);
  const platformLabel = PLATFORM_META[item.platform]?.label || item.platform;

  const perf = item.performance || {};
  const throughput = perf.base_gbps;
  const tpLabel = throughput === 0 ? '—' : (throughput != null ? throughput + '' : '—');
  const tpUnit = throughput === 0 ? '' : 'Gbps';

  // Secondary metric depends on platform
  let secLabel = 'Advanced Analysis';
  let secValue = perf.advanced_analysis != null ? fmtNum(perf.advanced_analysis) : '—';
  let secUnit = 'devices';
  if (item.platform === 'flow_collector') {
    secLabel = 'Flows/sec';
    secValue = perf.flows_per_second != null ? fmtNum(perf.flows_per_second) : '—';
    secUnit = '';
  } else if (item.platform === 'recordstore') {
    secLabel = 'Ingest Records/s';
    secValue = perf.ingest_records_per_sec != null ? fmtNum(perf.ingest_records_per_sec) : '—';
    secUnit = '';
  } else if (item.platform === 'packetstore' || item.platform === 'extended_storage') {
    const cap = computeStorageCapacityTb(item);
    secLabel = 'PCAP Capacity';
    secValue = cap > 0 ? cap + '' : '—';
    secUnit = cap > 0 ? 'TB' : '';
  } else if (item.platform === 'ids_standalone') {
    secLabel = 'IDS Throughput';
    secValue = perf.ids_gbps != null ? perf.ids_gbps + '' : '—';
    secUnit = 'Gbps';
  }

  const alreadyStacked = state.stack.find(s => s.id === item.name);

  card.innerHTML = `
    <div class="card-accent"></div>
    <div class="card-body">
      <div class="card-top">
        <div>
          <h3 class="card-title">${item.name}</h3>
          <div class="card-subtitle">${platformLabel}${gen ? ' · ' + gen : ''}</div>
        </div>
        <span class="status-dot ${status}">${prettyStatus(status)}</span>
      </div>

      <div class="card-metrics">
        <div class="metric">
          <div class="metric-label">Throughput</div>
          <div class="metric-value">${tpLabel}${tpUnit ? `<span class="unit">${tpUnit}</span>` : ''}</div>
        </div>
        <div class="metric">
          <div class="metric-label">${secLabel}</div>
          <div class="metric-value">${secValue}${secUnit ? `<span class="unit">${secUnit}</span>` : ''}</div>
        </div>
      </div>

      <div class="tag-row">
        <span class="tag" style="--tag-bg:rgba(137,138,141,0.14);--tag-color:#4a4a4e">${virt}</span>
        ${modules.map(m => {
          const mm = MODULE_META[m];
          return `<span class="tag" style="--tag-bg:${mm.color}1f;--tag-color:${mm.color}">${mm.label}</span>`;
        }).join('')}
      </div>

      <div class="card-actions">
        <a class="view-link" data-view="${item.name}">View details →</a>
        <button class="add-btn ${alreadyStacked ? 'added' : ''}" data-add="${item.name}">
          ${alreadyStacked
            ? `<svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> In stack (${alreadyStacked.qty})`
            : `<svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add`}
        </button>
      </div>
    </div>
  `;

  // Card interactions
  card.addEventListener('click', (e) => {
    if (e.target.closest('[data-add]')) return;
    openDetail(item.name);
  });
  card.querySelector('[data-add]')?.addEventListener('click', (e) => {
    e.stopPropagation();
    addToStack(item.name);
  });

  // Drag-and-drop
  card.addEventListener('dragstart', (e) => {
    card.classList.add('dragging');
    e.dataTransfer.setData('text/eh-item', item.name);
    e.dataTransfer.effectAllowed = 'copy';
  });
  card.addEventListener('dragend', () => card.classList.remove('dragging'));

  return card;
}

/* ============================================================
   Detail modal
   ============================================================ */

let activeDetailItem = null;

function openDetail(name) {
  const item = itemOf(name);
  if (!item) return;
  activeDetailItem = item;
  const accent = accentForPlatform(item.platform);
  const platformLabel = PLATFORM_META[item.platform]?.label || item.platform;

  const statusClass = item.sale_status || 'unknown';
  const modules = moduleKeys(item);

  const header = $('#modal-header');
  header.style.background = `linear-gradient(135deg, ${accent} 0%, var(--eh-plum) 110%)`;
  header.innerHTML = `
    <div class="modal-header-inner">
      <div>
        <div class="modal-lozenge">${platformLabel}${item.generation !== undefined ? ' · Gen ' + item.generation : ''}</div>
        <div class="modal-title">${item.name}</div>
        <div class="modal-subtitle">${deploymentBadge(item)} · ${prettyStatus(statusClass)}</div>
        <div class="modal-header-tags">
          ${modules.map(m => `<span class="tag">${MODULE_META[m]?.label || m}</span>`).join('')}
          ${(item.compatibility?.track_limits || []).map(t => `<span class="tag">${t.replace(/_/g,' ')}</span>`).join('')}
        </div>
      </div>
      <button class="modal-close" id="modal-close-x">×</button>
    </div>
  `;

  $('#modal-body').innerHTML = renderDetailBody(item);
  $('#modal-add-btn').innerHTML = (state.stack.find(s => s.id === item.name))
    ? `<svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Add Another`
    : `<svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add to Stack`;

  $('#modal-backdrop').classList.add('open');
  $('#modal-close-x').addEventListener('click', closeDetail);
}

function closeDetail() {
  $('#modal-backdrop').classList.remove('open');
  activeDetailItem = null;
}

function deploymentBadge(item) {
  if (isPhysical(item)) return 'Physical appliance';
  const dep = item.deployments || {};
  const parts = [];
  if (dep.hypervisors?.length) parts.push('Virtual: ' + dep.hypervisors.join(', '));
  if (dep.clouds?.length) parts.push('Cloud: ' + dep.clouds.map(c => c.toUpperCase()).join(', '));
  return parts.join(' · ') || 'Virtual';
}

function renderDetailBody(item) {
  const perf = item.performance || {};
  const ff = item.form_factor || {};

  // Top 4 stats based on platform
  const stats = [];
  const accent = accentForPlatform(item.platform);
  if (perf.base_gbps != null) stats.push({ label: 'Throughput',         value: perf.base_gbps,                  unit: 'Gbps',     color: accent, icon: '↯' });
  if (perf.ids_gbps != null && perf.ids_gbps > 0) stats.push({ label: 'IDS Throughput',     value: perf.ids_gbps,                   unit: 'Gbps',     color: 'var(--eh-tangerine)', icon: '🛡' });
  if (perf.base_packetrate != null) stats.push({ label: 'Packet Rate',          value: fmtNum(perf.base_packetrate),    unit: 'pps',      color: 'var(--eh-cyan)', icon: '▦' });
  if (perf.advanced_analysis != null) stats.push({ label: 'Advanced Analysis',    value: fmtNum(perf.advanced_analysis),  unit: 'devices',  color: 'var(--eh-sapphire)', icon: '◎' });
  if (perf.standard_analysis != null) stats.push({ label: 'Standard Analysis',    value: fmtNum(perf.standard_analysis),  unit: 'devices',  color: 'var(--eh-plum)', icon: '◉' });
  if (perf.ti_observable != null) stats.push({ label: 'TI Observables',       value: fmtNum(perf.ti_observable),       unit: '',         color: 'var(--eh-magenta)', icon: '⌖' });
  if (perf.flows_per_second != null) stats.push({ label: 'Flows / sec',          value: fmtNum(perf.flows_per_second),   unit: '',         color: '#7FA800', icon: '≋' });
  if (perf.ingest_records_per_sec != null) stats.push({ label: 'Ingest Records',       value: fmtNum(perf.ingest_records_per_sec), unit: '/s', color: 'var(--eh-magenta)', icon: '⇣' });
  const cap = computeStorageCapacityTb(item);
  if (cap > 0) stats.push({ label: 'PCAP Capacity', value: cap, unit: 'TB', color: 'var(--eh-plum)', icon: '⬟' });
  if (ff.rack_units != null) stats.push({ label: 'Rack Units', value: ff.rack_units, unit: 'U', color: 'var(--eh-gray)', icon: '▯' });
  if (ff.power_watts != null) stats.push({ label: 'Power', value: ff.power_watts, unit: 'W', color: 'var(--eh-tangerine)', icon: '⚡' });

  const statCards = stats.slice(0, 8).map(s => `
    <div class="detail-stat" style="--stat-accent:${s.color}">
      <div class="ds-icon" style="background:${s.color}">${s.icon}</div>
      <div class="ds-label">${s.label}</div>
      <div class="ds-value">${s.value}${s.unit ? `<span class="unit">${s.unit}</span>` : ''}</div>
    </div>
  `).join('');

  // Identifiers
  const skus = item.skus || {};
  const identRows = [];
  if (skus.enterprise) identRows.push({ l: 'Enterprise SKU', v: skus.enterprise, mono: true });
  if (skus.rx360) identRows.push({ l: 'Reveal(x) 360 SKU', v: skus.rx360, mono: true });
  identRows.push({ l: 'Generation', v: item.generation !== undefined ? 'Gen ' + item.generation : '—' });
  identRows.push({ l: 'Deployment', v: deploymentBadge(item) });
  identRows.push({ l: 'Sale Status', v: prettyStatus(item.sale_status || '—') });
  if (item.firmware_end_date) identRows.push({ l: 'Firmware End Date', v: item.firmware_end_date });
  if (item.support_end_date) identRows.push({ l: 'Support End Date', v: item.support_end_date });
  if (item.engine) identRows.push({ l: 'Engine', v: `${item.engine.name} v${item.engine.version}` });

  // Interfaces
  let interfacesHtml = '';
  const ifs = item.interfaces || {};
  const mgmt = ifs.management || [];
  const cap_if = ifs.capture || [];
  if (mgmt.length || cap_if.length) {
    const allPorts = [...mgmt.map(p => ({ ...p, _kind: 'mgmt' })), ...cap_if.map(p => ({ ...p, _kind: 'capture' }))];
    interfacesHtml = `
      <div class="section-block">
        <div class="section-head">
          <h3>Interfaces</h3>
          <div class="eyebrow">${allPorts.length} ports · ${mgmt.length} mgmt · ${cap_if.length} capture</div>
        </div>
        <div class="capture-ring">
          ${allPorts.map(p => `
            <div class="port-slot ${p._kind}">
              <div class="port-num">${p.id}</div>
              <div class="port-speed">${(p.supported_speeds_gb || []).map(s => s + 'G').join('/')}</div>
              <div>${p.transceiver_type || '—'}</div>
            </div>
          `).join('')}
        </div>
        <table class="iface-table" style="margin-top:14px">
          <thead><tr><th>Port</th><th>Roles</th><th>Speeds</th><th>Transceiver</th><th>Inc.</th></tr></thead>
          <tbody>
            ${allPorts.map(p => `
              <tr>
                <td><strong>${p.id}</strong> <span style="color:var(--eh-muted);font-size:11px;text-transform:uppercase;margin-left:4px">${p._kind}</span></td>
                <td>${(p.roles || []).map(r => `<span class="ifchip ${r.toLowerCase()}">${r}</span>`).join(' ')}</td>
                <td>${(p.supported_speeds_gb || []).map(s => s + 'G').join(' / ')}</td>
                <td>${p.transceiver_type || '—'}</td>
                <td>${p.transceiver_included ? '✓' : '—'}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
  }

  // Storage
  let storageHtml = '';
  const st = item.storage || {};
  if (st.continuous_pcap || st.datastore) {
    const rows = [];
    const cp = st.continuous_pcap;
    if (cp) {
      if (cp.disk_qty) rows.push({ l: 'Onboard Disks', v: `${cp.disk_qty} × ${cp.disk_size_tb}TB (${cp.raid_level || ''})` });
      if (cp.capacity_tb) rows.push({ l: 'Onboard Capacity', v: cp.capacity_tb + ' TB' });
      if (cp.onboard) rows.push({ l: 'Onboard Storage', v: `${cp.onboard.disk_qty} × ${cp.onboard.disk_size_tb}TB @ ${cp.onboard.rpm || ''} RPM` });
      if (cp.virtual_disk) rows.push({ l: 'Virtual Disk', v: `${cp.virtual_disk.disk_qty} × ${cp.virtual_disk.disk_size_tb || cp.virtual_disk.max_disk_size_tb}TB` });
    }
    if (st.datastore?.exds?.protocols) rows.push({ l: 'External Datastore (EXDS)', v: st.datastore.exds.protocols.map(p => p.toUpperCase()).join(', ') });

    let rulesHtml = '';
    if (cp?.extended_pcap?.rules) {
      rulesHtml = `
        <div style="margin-top:12px">
          <div class="kv-label" style="margin-bottom:6px">Extended PCAP — ESU Scaling</div>
          <table class="iface-table">
            <thead><tr><th>ESUs</th><th>Type</th><th>Throughput</th><th>Packets/sec</th></tr></thead>
            <tbody>
              ${cp.extended_pcap.rules.map(r => `
                <tr>
                  <td><strong>${r.esu_count}×</strong></td>
                  <td>${r.esu_type}</td>
                  <td>${r.throughput_gbps} Gbps</td>
                  <td>${fmtNum(r.packets_per_second)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    }

    storageHtml = `
      <div class="section-block">
        <div class="section-head"><h3>Storage</h3></div>
        <div class="kv-grid">
          ${rows.map(r => `<div class="kv"><div class="kv-label">${r.l}</div><div class="kv-value">${r.v}</div></div>`).join('')}
        </div>
        ${rulesHtml}
      </div>
    `;
  }

  // Compatibility
  let compatHtml = '';
  const c = item.compatibility;
  if (c) {
    const parts = [];
    if (c.track_limits) parts.push(`<div class="kv"><div class="kv-label">Track Limits</div><div class="kv-value">${c.track_limits.map(t=>t.replace(/_/g,' ')).join(' · ')}</div></div>`);
    if (c.allows) parts.push(`<div class="kv"><div class="kv-label">Attaches To</div><div class="kv-value">${c.allows.join(', ')}</div></div>`);
    if (c.accepts_attachments) {
      const atts = c.accepts_attachments.map(a => {
        const models = a.models.map(m => `${m.model} (up to ${m.limit})`).join(', ');
        return `${a.type}: ${models}`;
      }).join('; ');
      parts.push(`<div class="kv"><div class="kv-label">Accepts Attachments</div><div class="kv-value">${atts}</div></div>`);
    }
    compatHtml = `
      <div class="section-block">
        <div class="section-head"><h3>Compatibility</h3></div>
        <div class="kv-grid">${parts.join('')}</div>
      </div>
    `;
  }

  // Ingest (EFC)
  let ingestHtml = '';
  if (item.ingest) {
    ingestHtml = `
      <div class="section-block">
        <div class="section-head"><h3>Ingest</h3></div>
        <div class="kv-grid">
          <div class="kv"><div class="kv-label">Supported Protocols</div><div class="kv-value">${(item.ingest.supported_protocols || []).join(', ').toUpperCase()}</div></div>
        </div>
      </div>
    `;
  }

  // Notes / references
  let notesHtml = '';
  if (item.notes?.length) {
    notesHtml = `
      <div class="section-block">
        <div class="section-head"><h3>References</h3></div>
        <ul class="notes-list">
          ${item.notes.map(n => n.startsWith('http')
            ? `<li><a href="${n}" target="_blank" rel="noopener">${n}</a></li>`
            : `<li>${n}</li>`).join('')}
        </ul>
      </div>
    `;
  }

  return `
    <div class="detail-grid">${statCards}</div>

    <div class="section-block">
      <div class="section-head">
        <h3>Identifiers</h3>
        <div class="eyebrow">${item.platform.replace(/_/g,' ')}</div>
      </div>
      <div class="kv-grid">
        ${identRows.map(r => `<div class="kv"><div class="kv-label">${r.l}</div><div class="kv-value ${r.mono?'mono':''}">${r.v || '—'}</div></div>`).join('')}
      </div>
    </div>

    ${(Object.keys(item.modules || {}).length)
      ? `<div class="section-block">
          <div class="section-head"><h3>Supported Modules</h3></div>
          <div class="tag-row">
            ${moduleKeys(item).map(m => {
              const mm = MODULE_META[m];
              return `<span class="tag" style="--tag-bg:${mm.color}1f;--tag-color:${mm.color};font-size:11.5px;padding:4px 10px">${mm.label} — ${mm.description}</span>`;
            }).join('')}
          </div>
         </div>`
      : ''}

    ${interfacesHtml}
    ${storageHtml}
    ${compatHtml}
    ${ingestHtml}
    ${notesHtml}
  `;
}

/* ============================================================
   STACK BUILDER
   ============================================================ */

function toast(message, kind = 'info', ms = 2800) {
  const host = document.getElementById('toast-host');
  if (!host) return;
  const el = document.createElement('div');
  el.className = 'toast ' + (kind === 'warn' ? 'toast-warn' : 'toast-info');
  el.innerHTML = `<span class="dot"></span><span>${message}</span>`;
  host.appendChild(el);
  setTimeout(() => {
    el.style.transition = 'opacity 0.22s ease, transform 0.22s ease';
    el.style.opacity = '0';
    el.style.transform = 'translateY(8px)';
    setTimeout(() => el.remove(), 260);
  }, ms);
}

function addToStack(name, n = 1) {
  const item = itemOf(name);
  if (!item) return;

  // Infrastructure items (ECA Console, EXA Record Store) federate across stacks
  // and are not placed inside a stack. Redirect to the detail view instead.
  if (INFRA_PLATFORMS.has(item.platform)) {
    toast(`${item.name} is shared infrastructure, not part of a stack.`, 'warn');
    return;
  }

  // Enforce single EDA per stack (a stack is site-scoped: 1 EDA + ETA(s) + ESU(s))
  if (SENSOR_PLATFORMS.has(item.platform)) {
    const existingSensor = state.stack
      .map(s => itemOf(s.id))
      .find(it => it && SENSOR_PLATFORMS.has(it.platform) && it.name !== name);
    if (existingSensor) {
      toast(`A stack holds one EDA. Remove ${existingSensor.name} first.`, 'warn');
      return;
    }
    const alreadyHere = state.stack.find(s => s.id === name);
    if (alreadyHere) {
      toast(`A stack holds one EDA — ${name} is already in this stack.`, 'warn');
      return;
    }
  }

  // Track-conflict guard (enterprise_only vs rx360_only)
  const newTracks = new Set(item.compatibility?.track_limits || []);
  const stackTracks = new Set();
  for (const s of state.stack) {
    (itemOf(s.id)?.compatibility?.track_limits || []).forEach(t => stackTracks.add(t));
  }
  if ((newTracks.has('enterprise_only') && stackTracks.has('rx360_only')) ||
      (newTracks.has('rx360_only') && stackTracks.has('enterprise_only'))) {
    toast(`${item.name} conflicts with the stack's licensing track.`, 'warn');
    return;
  }

  const existing = state.stack.find(s => s.id === name);
  if (existing) existing.qty += n; else state.stack.push({ id: name, qty: n });
  persistStack();
  renderStack();
  // subtly pulse the totals
  pulseTotals();
  updateCatalogAddedStates();
  updateFabCount();
}

function removeFromStack(name) {
  state.stack = state.stack.filter(s => s.id !== name);
  persistStack();
  renderStack();
  pulseTotals();
  updateCatalogAddedStates();
  updateFabCount();
}

function changeQty(name, delta) {
  const ex = state.stack.find(s => s.id === name);
  if (!ex) return;
  const item = itemOf(name);
  // Don't let a sensor go above 1 per stack
  if (delta > 0 && item && SENSOR_PLATFORMS.has(item.platform) && ex.qty >= 1) {
    toast('A stack holds one EDA.', 'warn');
    return;
  }
  ex.qty = Math.max(0, ex.qty + delta);
  if (ex.qty === 0) removeFromStack(name); else {
    persistStack();
    renderStack();
    pulseTotals();
    updateCatalogAddedStates();
    updateFabCount();
  }
}

function clearStack() {
  state.stack = [];
  persistStack();
  renderStack();
  updateCatalogAddedStates();
  updateFabCount();
}

function updateFabCount() {
  const el = document.getElementById('fab-count');
  if (!el) return;
  const total = state.stack.reduce((n, s) => n + (s.qty || 0), 0);
  el.textContent = String(total);
  el.style.display = total ? '' : 'none';
}

function isDrawerMode() {
  return window.matchMedia('(max-width: 1400px)').matches;
}
function openDrawer() {
  document.getElementById('stack-panel')?.classList.add('open');
  document.getElementById('stack-scrim')?.classList.add('open');
}
function closeDrawer() {
  document.getElementById('stack-panel')?.classList.remove('open');
  document.getElementById('stack-scrim')?.classList.remove('open');
}
function toggleDrawer() {
  const panel = document.getElementById('stack-panel');
  if (!panel) return;
  panel.classList.contains('open') ? closeDrawer() : openDrawer();
}

function persistStack() {
  try {
    localStorage.setItem('eh-stack', JSON.stringify({ stack: state.stack, name: state.stackName, notes: state.stackNotes }));
  } catch (e) { /* ignore */ }
}

function pulseTotals() {
  $$('.total-metric').forEach(el => {
    el.classList.remove('pulse');
    // Force reflow then re-add so each update triggers anim
    void el.offsetWidth;
    el.classList.add('pulse');
    setTimeout(() => el.classList.remove('pulse'), 360);
  });
}

function updateCatalogAddedStates() {
  // repaint add buttons on visible cards without full re-render
  $$('#catalog-grid .card').forEach(card => {
    const id = card.dataset.id;
    const btn = card.querySelector('[data-add]');
    if (!btn) return;
    const entry = state.stack.find(s => s.id === id);
    if (entry) {
      btn.classList.add('added');
      btn.innerHTML = `<svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> In stack (${entry.qty})`;
    } else {
      btn.classList.remove('added');
      btn.innerHTML = `<svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add`;
    }
  });
}

function computeStackTotals() {
  let throughput = 0, ids = 0, advanced = 0, standard = 0, tiObservable = 0;
  let flowsPerSec = 0, ingestRps = 0;
  let rackU = 0, power = 0, pcapTb = 0;
  let sensorCount = 0, consoleCount = 0, storeCount = 0, recordCount = 0, flowCount = 0;

  for (const s of state.stack) {
    const item = itemOf(s.id);
    if (!item) continue;
    const p = item.performance || {};
    const ff = item.form_factor || {};
    const q = s.qty;
    // Only sensors contribute to throughput/advanced/standard/ids
    const sensorPlatforms = ['packet_sensor','multifunction_sensor','all_in_one','ids_standalone'];
    if (sensorPlatforms.includes(item.platform)) {
      sensorCount += q;
      throughput += (p.base_gbps || 0) * q;
      ids += (p.ids_gbps || 0) * q;
      advanced += (p.advanced_analysis || 0) * q;
      standard += (p.standard_analysis || 0) * q;
      tiObservable += (p.ti_observable || 0) * q;
    }
    if (item.platform === 'command') consoleCount += q;
    if (item.platform === 'packetstore' || item.platform === 'extended_storage') storeCount += q;
    if (item.platform === 'recordstore') {
      recordCount += q;
      ingestRps += (p.ingest_records_per_sec || 0) * q;
    }
    if (item.platform === 'flow_collector') {
      flowCount += q;
      flowsPerSec += (p.flows_per_second || 0) * q;
    }
    if (ff.rack_units) rackU += ff.rack_units * q;
    if (ff.power_watts) power += ff.power_watts * q;
    pcapTb += computeStorageCapacityTb(item) * q;
  }

  return { throughput, ids, advanced, standard, tiObservable, flowsPerSec, ingestRps,
           rackU, power, pcapTb, sensorCount, consoleCount, storeCount, recordCount, flowCount };
}

function computeCompatibilityWarnings() {
  const warns = [];
  const items = state.stack.map(s => ({ ...itemOf(s.id), __qty: s.qty })).filter(Boolean);

  // Track limits detection
  const tracks = new Set();
  for (const it of items) {
    const limits = it.compatibility?.track_limits || [];
    for (const t of limits) tracks.add(t);
  }
  if (tracks.has('enterprise_only') && tracks.has('rx360_only')) {
    warns.push('Mixed track limits: stack contains <strong>Enterprise-only</strong> and <strong>Reveal(x) 360-only</strong> components. These cannot coexist in a single deployment.');
  }

  // ESU attachment checks — verify against actual per-instance topology allocation
  const topology = planTopology(items);
  const orphanedEsus = topology.esuAssignments.filter(x => x.host.type === 'orphan');
  if (orphanedEsus.length) {
    const counts = new Map();
    orphanedEsus.forEach(({ esu }) => counts.set(esu.name, (counts.get(esu.name) || 0) + 1));
    counts.forEach((count, esuName) => {
      warns.push(`<strong>${esuName}</strong> has ${count} unattached unit${count !== 1 ? 's' : ''}. Add compatible ETA/AIO capacity or reduce ESU quantity.`);
    });
  }

  // EOL warnings
  const eol = items.filter(x => x.sale_status === 'end_of_sale');
  if (eol.length) {
    warns.push(`End-of-sale items in stack: ${eol.map(x => x.name).join(', ')}. Plan for lifecycle replacement.`);
  }

  return warns;
}

function acceptsEsu(item, esuName) {
  const atts = item?.compatibility?.accepts_attachments;
  if (!atts) return false;
  for (const a of atts) {
    if (a.type !== 'ESU') continue;
    for (const m of (a.models || [])) {
      if (m.model === esuName) return true;
    }
  }
  return false;
}

function acceptsAnyEsu(item) {
  const atts = item?.compatibility?.accepts_attachments;
  if (!atts) return false;
  return atts.some(a => a.type === 'ESU');
}

function getEsuAttachmentLimit(hostItem, esuName) {
  const atts = hostItem?.compatibility?.accepts_attachments;
  if (!atts) return 0;
  for (const a of atts) {
    if (a.type !== 'ESU') continue;
    for (const m of (a.models || [])) {
      if (m.model === esuName) return m.limit || 0;
    }
  }
  return 0;
}

function getAssignableEsuHosts(etas, aioHost, esuName) {
  const hosts = [];

  for (const eta of etas) {
    const limit = getEsuAttachmentLimit(eta.item, esuName);
    if (!limit) continue;
    hosts.push({ type: 'eta', ref: eta, limit, priority: 0 });
  }

  if (aioHost) {
    const limit = getEsuAttachmentLimit(aioHost.item, esuName);
    if (limit) hosts.push({ type: 'aio', ref: aioHost, limit, priority: 1 });
  }

  hosts.sort((a, b) => {
    if (a.priority !== b.priority) return a.priority - b.priority;
    if (a.ref.idx !== b.ref.idx) return a.ref.idx - b.ref.idx;
    return a.type.localeCompare(b.type);
  });

  return hosts;
}

function formatTopologyInstanceName(inst) {
  if (!inst) return '';
  const qty = inst.item?.__qty || 1;
  return qty > 1 ? `${inst.name} #${inst.idx + 1}` : inst.name;
}

function renderStorageAttachmentMap(plan) {
  if (!plan.esuAssignments.length) return '';

  const rows = [];
  const grouped = new Map();
  plan.esuAssignments.forEach(({ esu, host }) => {
    const key = host.type === 'orphan'
      ? 'orphan'
      : `${host.type}:${formatTopologyInstanceName(host.ref)}`;
    if (!grouped.has(key)) grouped.set(key, { host, esus: [] });
    grouped.get(key).esus.push(formatTopologyInstanceName(esu));
  });

  plan.etas.forEach(eta => {
    const key = `eta:${formatTopologyInstanceName(eta)}`;
    const bucket = grouped.get(key);
    rows.push(`
      <li>
        <div class="xl-left">${formatTopologyInstanceName(eta)}</div>
        <div class="xl-right">${bucket?.esus.length ? bucket.esus.join(', ') : 'No ESUs attached'}</div>
      </li>
    `);
  });

  if (plan.sensor?.item.platform === 'all_in_one') {
    const key = `aio:${formatTopologyInstanceName(plan.sensor)}`;
    const bucket = grouped.get(key);
    if (bucket?.esus.length) {
      rows.push(`
        <li>
          <div class="xl-left">${formatTopologyInstanceName(plan.sensor)}</div>
          <div class="xl-right">${bucket.esus.join(', ')}</div>
        </li>
      `);
    }
  }

  const orphanBucket = grouped.get('orphan');
  if (orphanBucket?.esus.length) {
    rows.push(`
      <li style="--plt-color:${colorForPlatform('extended_storage')}">
        <div class="xl-left">Unattached ESUs</div>
        <div class="xl-right">${orphanBucket.esus.join(', ')}</div>
      </li>
    `);
  }

  return `
    <div class="export-section">
      <h2>Storage Attachment Map</h2>
      <ul class="export-list">
        ${rows.join('')}
      </ul>
    </div>
  `;
}

function renderStack() {
  $('#stack-name').value = state.stackName || '';
  $('#stack-notes').value = state.stackNotes || '';
  const body = $('#stack-body');
  body.innerHTML = '';

  if (!state.stack.length) {
    // Empty state: show the dashed drop-zone hint
    const drop = document.createElement('div');
    drop.className = 'drop-zone';
    drop.id = 'drop-zone';
    drop.innerHTML = `<strong>Drop appliances here</strong>Start with one EDA — add ETAs, ESUs, IDS, or EFC as needed`;
    wireDropZone(drop);
    body.appendChild(drop);
  } else {
    // Group by platform group
    const groups = {};
    for (const entry of state.stack) {
      const item = itemOf(entry.id);
      if (!item) continue;
      const g = PLATFORM_META[item.platform]?.group || 'Other';
      (groups[g] ||= []).push({ entry, item });
    }
    const orderedGroups = Object.entries(groups).sort(
      (a, b) => (PLATFORM_META[a[1][0].item.platform]?.order ?? 99) - (PLATFORM_META[b[1][0].item.platform]?.order ?? 99)
    );

    orderedGroups.forEach(([groupName, arr]) => {
      const section = document.createElement('div');
      section.className = 'stack-section';
      const accent = PLATFORM_META[arr[0].item.platform]?.accent || 'var(--eh-sapphire)';
      const nodesHtml = arr.map(({ entry, item }) => {
        const perf = item.performance || {};
        const bits = [];
        if (perf.base_gbps != null && perf.base_gbps > 0) bits.push(`${perf.base_gbps} Gbps`);
        const kind = deploymentKind(item);
        if (kind === 'Physical' && item.form_factor?.rack_units) bits.push(`${item.form_factor.rack_units}U`);
        if (kind !== 'Physical') bits.push(kind);
        if (item.sale_status === 'end_of_sale') bits.push('EOS');
        return `
          <div class="stack-node" style="--plt-color:${accentForPlatform(item.platform)}">
            <button class="remove-btn" data-rm="${item.name}" aria-label="Remove">×</button>
            <div class="stack-node-info">
              <div class="stack-node-name" title="${item.name}">${item.name}</div>
              <div class="stack-node-meta">${bits.map(b => `<span>${b}</span>`).join('<span>·</span>')}</div>
            </div>
            <div class="stack-node-qty">
              <button data-dec="${item.name}" aria-label="Decrease">−</button>
              <span class="qty-num">${entry.qty}</span>
              <button data-inc="${item.name}" aria-label="Increase">+</button>
            </div>
          </div>
        `;
      }).join('');
      section.innerHTML = `
        <div class="stack-section-title" style="--plt-color:${accent}">${groupName} <span style="color:var(--eh-gray);font-weight:600;margin-left:auto">${arr.reduce((n, x) => n + x.entry.qty, 0)} unit${arr.length > 1 ? 's' : ''}</span></div>
        <div class="stack-section-nodes">${nodesHtml}</div>
      `;
      body.appendChild(section);
    });

    // Compat warnings
    const warns = computeCompatibilityWarnings();
    if (warns.length) {
      const w = document.createElement('div');
      w.className = 'stack-compat-warn';
      w.innerHTML = `<strong>Compatibility notes</strong><br>${warns.map(x => '• ' + x).join('<br>')}`;
      body.appendChild(w);
    }
  }

  // Totals
  const t = computeStackTotals();
  const totals = [
    { label: 'Throughput',  value: t.throughput,     unit: 'Gbps',    accent: 'var(--eh-cyan)' },
    { label: 'IDS',         value: t.ids,            unit: 'Gbps',    accent: 'var(--eh-tangerine)' },
    { label: 'Advanced Analysis', value: fmtNum(t.advanced), unit: 'devices', accent: 'var(--eh-sapphire)' },
    { label: 'Standard Analysis', value: fmtNum(t.standard), unit: 'devices', accent: 'var(--eh-plum)' },
    { label: 'Sensors',      value: t.sensorCount,    unit: '',         accent: 'var(--eh-cyan)' },
    { label: 'Rack Units',   value: t.rackU,          unit: 'U',        accent: 'var(--eh-gray)' },
    { label: 'Power',        value: fmtNum(t.power),  unit: 'W',        accent: 'var(--eh-tangerine)' },
    { label: 'PCAP Storage', value: t.pcapTb,         unit: 'TB',       accent: 'var(--eh-plum)' },
  ];
  if (t.flowsPerSec > 0) totals.push({ label: 'Flows/sec', value: fmtNum(t.flowsPerSec), unit: '', accent: '#7FA800' });
  if (t.ingestRps > 0) totals.push({ label: 'Record Ingest', value: fmtNum(t.ingestRps), unit: '/s', accent: 'var(--eh-magenta)' });

  $('#stack-totals-grid').innerHTML = totals.map(tt => `
    <div class="total-metric" style="--metric-accent:${tt.accent}">
      <div class="tm-label">${tt.label}</div>
      <div class="tm-value">${tt.value}${tt.unit ? `<span class="unit">${tt.unit}</span>` : ''}</div>
    </div>
  `).join('');

  // Wire node buttons
  body.querySelectorAll('[data-rm]').forEach(b => b.addEventListener('click', () => removeFromStack(b.dataset.rm)));
  body.querySelectorAll('[data-inc]').forEach(b => b.addEventListener('click', () => changeQty(b.dataset.inc, +1)));
  body.querySelectorAll('[data-dec]').forEach(b => b.addEventListener('click', () => changeQty(b.dataset.dec, -1)));
}

function wireDropZone(zone) {
  zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
  zone.addEventListener('drop', (e) => {
    e.preventDefault();
    zone.classList.remove('drag-over');
    const id = e.dataTransfer.getData('text/eh-item');
    if (id) addToStack(id);
  });
}

// Also make entire stack panel body a drop target — works whether or not the dashed drop-zone hint is rendered
$('#stack-panel').addEventListener('dragover', (e) => {
  if (e.dataTransfer.types.includes('text/eh-item')) {
    e.preventDefault();
    $('#drop-zone')?.classList.add('drag-over');
    $('#stack-body')?.classList.add('drag-over-body');
  }
});
$('#stack-panel').addEventListener('dragleave', (e) => {
  if (!$('#stack-panel').contains(e.relatedTarget)) {
    $('#drop-zone')?.classList.remove('drag-over');
    $('#stack-body')?.classList.remove('drag-over-body');
  }
});
$('#stack-panel').addEventListener('drop', (e) => {
  const id = e.dataTransfer.getData('text/eh-item');
  if (id) {
    e.preventDefault();
    addToStack(id);
    $('#drop-zone')?.classList.remove('drag-over');
    $('#stack-body')?.classList.remove('drag-over-body');
  }
});

function buildExportContent() {
  const t = computeStackTotals();
  const items = state.stack.map(s => ({ ...itemOf(s.id), __qty: s.qty })).filter(Boolean);
  const topology = planTopology(items);
  const name = state.stackName?.trim() || 'ExtraHop Reference Solution';
  const dateStr = new Date().toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' });
  const notesHtml = (state.stackNotes || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');

  // Group for display
  const groups = {};
  for (const it of items) {
    const g = PLATFORM_META[it.platform]?.group || 'Other';
    (groups[g] ||= []).push(it);
  }
  const orderedGroups = Object.entries(groups).sort(
    (a, b) => (PLATFORM_META[a[1][0].platform]?.order ?? 99) - (PLATFORM_META[b[1][0].platform]?.order ?? 99)
  );

  // Summary line
  const totalUnits = items.reduce((n, x) => n + x.__qty, 0);
  const summary = `${totalUnits} appliance${totalUnits !== 1 ? 's' : ''} · ${t.throughput} Gbps analysis${t.pcapTb ? ' · ' + t.pcapTb + ' TB PCAP' : ''}`;

  // Topology SVG — simple reference diagram grouped by role
  const svg = renderTopologyDiagram(items);
  const storageAttachmentMap = renderStorageAttachmentMap(topology);

  const body = `
    <div class="export-root" id="export-root">

/* ============================================================
   Topology — cabled tree view
   Rows: Console (symbolic) → EDA + optional IDS/EFC → ETA(s) → ESU(s)
   ============================================================ */

function planTopology(items) {
  // Flatten by qty — ESUs and ETAs need individual instances
  const sensors = [];
  const ids = [];
  const efc = [];
  const etas = [];
  const esus = [];

  for (const it of items) {
    const n = it.__qty || 1;
    for (let i = 0; i < n; i++) {
      const inst = { name: it.name, item: it, idx: i };
      if (SENSOR_PLATFORMS.has(it.platform)) sensors.push(inst);
      else if (it.platform === 'ids_standalone') ids.push(inst);
      else if (it.platform === 'flow_collector') efc.push(inst);
      else if (it.platform === 'packetstore') etas.push(inst);
      else if (it.platform === 'extended_storage') esus.push(inst);
    }
  }

  const sensor = sensors[0] || null; // enforced: 1 EDA per stack
  const aioHost = sensor && sensor.item.platform === 'all_in_one' ? sensor : null;

  const esuAssignments = []; // {esu, host: {type:'eta'|'aio'|'orphan', ref}}
  const hostState = new Map();
  etas.forEach(eta => hostState.set(eta, { totalLoad: 0, esuType: null }));
  if (aioHost) hostState.set(aioHost, { totalLoad: 0, esuType: null });

  const esuGroups = new Map();
  esus.forEach(esu => {
    if (!esuGroups.has(esu.name)) esuGroups.set(esu.name, []);
    esuGroups.get(esu.name).push(esu);
  });

  const groupEntries = [...esuGroups.entries()];

  if (groupEntries.length <= 1) {
    const assignBalanced = (esu) => {
      const candidates = getAssignableEsuHosts(etas, aioHost, esu.name)
        .map(host => {
          const state = hostState.get(host.ref) || { totalLoad: 0, esuType: null };
          if (state.esuType && state.esuType !== esu.name) return null;
          if (state.totalLoad >= host.limit) return null;
          return { ...host, load: state.totalLoad };
        })
        .filter(Boolean);

      candidates.sort((a, b) => {
        const aRatio = a.load / a.limit;
        const bRatio = b.load / b.limit;
        if (aRatio !== bRatio) return aRatio - bRatio;
        if (a.load !== b.load) return a.load - b.load;
        if (a.priority !== b.priority) return a.priority - b.priority;
        return a.ref.idx - b.ref.idx;
      });

      const chosen = candidates[0] || null;
      if (!chosen) {
        esuAssignments.push({ esu, host: { type: 'orphan', ref: null } });
        return;
      }

      const state = hostState.get(chosen.ref);
      state.totalLoad += 1;
      state.esuType = esu.name;
      esuAssignments.push({ esu, host: { type: chosen.type, ref: chosen.ref } });
    };

    esus.forEach(assignBalanced);
    return { sensor, ids, efc, etas, esus, esuAssignments };
  }

  groupEntries.sort((a, b) => {
    const [aName, aEsus] = a;
    const [bName, bEsus] = b;
    const aHosts = getAssignableEsuHosts(etas, aioHost, aName);
    const bHosts = getAssignableEsuHosts(etas, aioHost, bName);
    if (aHosts.length !== bHosts.length) return aHosts.length - bHosts.length;
    if (aEsus.length !== bEsus.length) return bEsus.length - aEsus.length;
    return aName.localeCompare(bName);
  });

  for (const [esuName, group] of groupEntries) {
    for (const esu of group) {
      const candidates = getAssignableEsuHosts(etas, aioHost, esuName)
        .map(host => {
          const state = hostState.get(host.ref) || { totalLoad: 0, esuType: null };
          if (state.totalLoad >= host.limit) return null;
          const sameType = state.esuType === esuName;
          const empty = state.esuType == null;
          if (!sameType && !empty) return null;
          return {
            ...host,
            load: state.totalLoad,
            sameType,
            empty,
          };
        })
        .filter(Boolean);

      candidates.sort((a, b) => {
        if (a.sameType !== b.sameType) return a.sameType ? -1 : 1;
        if (a.empty !== b.empty) return a.empty ? -1 : 1;
        const aRemaining = a.limit - a.load;
        const bRemaining = b.limit - b.load;
        if (aRemaining !== bRemaining) return bRemaining - aRemaining;
        if (a.priority !== b.priority) return a.priority - b.priority;
        if (a.load !== b.load) return a.load - b.load;
        return a.ref.idx - b.ref.idx;
      });

      const chosen = candidates[0] || null;
      if (!chosen) {
        esuAssignments.push({ esu, host: { type: 'orphan', ref: null } });
        continue;
      }

      const state = hostState.get(chosen.ref);
      state.totalLoad += 1;
      state.esuType = esuName;
      esuAssignments.push({ esu, host: { type: chosen.type, ref: chosen.ref } });
    }
  }

  return { sensor, ids, efc, etas, esus, esuAssignments };
}

function colorForPlatform(platform) {
  const m = {
    packet_sensor: '#00AAEF',
    multifunction_sensor: '#007FAF',
    all_in_one: '#5B2F8E',
    ids_standalone: '#F05918',
    flow_collector: '#7FA800',
    packetstore: '#7F2854',
    extended_storage: '#898A8D',
    command: '#261F63',
    recordstore: '#EC0889',
  };
  return m[platform] || '#261F63';
}

function renderAppNode(x, y, w, h, opts) {
  // opts: { title, subtitle, accent, ribbon, dim }
  const accent = opts.accent || '#261F63';
  const dim = !!opts.dim;
  const ribbon = opts.ribbon || '';
  const title = (opts.title || '').replace(/&/g, '&amp;').replace(/</g, '&lt;');
  const subtitle = (opts.subtitle || '').replace(/&/g, '&amp;').replace(/</g, '&lt;');
  const textLeft = 16;
  return `
    <g transform="translate(${x}, ${y})" opacity="${dim ? 0.55 : 1}">
      <rect x="0" y="0" width="${w}" height="${h}" rx="10"
            fill="white" stroke="${accent}" stroke-width="1.6" filter="url(#eh-shadow)"/>
      <rect x="0" y="0" width="5" height="${h}" rx="2" fill="${accent}"/>
      ${ribbon ? `
        <g transform="translate(${w - 8}, 8)">
          <rect x="-44" y="0" width="44" height="15" rx="7.5" fill="${accent}"/>
          <text x="-22" y="10.5" text-anchor="middle" font-family="Source Sans 3"
                font-weight="800" font-size="9" fill="white" letter-spacing="0.8">${ribbon}</text>
        </g>` : ''}
      <text x="${textLeft}" y="24" text-anchor="start" font-family="Source Sans 3"
            font-weight="800" font-size="12.5" fill="#15103A">${title}</text>
      <text x="${textLeft}" y="42" text-anchor="start" font-family="Source Sans 3"
            font-size="10.5" fill="#6B6880">${subtitle}</text>
    </g>
  `;
}

function drawCable(from, to, opts = {}) {
  // from/to: {x,y} points on node edges
  const color = opts.color || '#261F63';
  const dashed = !!opts.dashed;
  const dx = to.x - from.x, dy = to.y - from.y;
  const cy1 = from.y + dy * 0.5;
  const cy2 = to.y - dy * 0.5;
  const path = `M ${from.x} ${from.y} C ${from.x} ${cy1}, ${to.x} ${cy2}, ${to.x} ${to.y}`;
  return `
    <path d="${path}" stroke="${color}" stroke-width="1.6" fill="none"
          ${dashed ? 'stroke-dasharray="4 3"' : ''} opacity="0.75"/>
    <circle cx="${from.x}" cy="${from.y}" r="2.5" fill="${color}"/>
    <circle cx="${to.x}" cy="${to.y}" r="2.5" fill="${color}"/>
  `;
}

function renderTopologyDiagram(items) {
  if (!items.length) {
    return `<svg viewBox="0 0 800 140" class="diagram-svg"><rect x="0" y="0" width="800" height="140" fill="#FAFAFC" rx="10"/><text x="400" y="76" text-anchor="middle" font-family="Source Sans 3" font-size="14" fill="#898A8D">No components in stack · drag appliances to build one</text></svg>`;
  }

  const plan = planTopology(items);
  const { sensor, ids, efc, etas, esus, esuAssignments } = plan;

  // Layout constants
  const nodeW = 140, nodeH = 52;
  const gapX = 22, gapY = 56;

  // Row 0: Console symbolic (ExtraHop Console)
  const consoleY = 28;
  const consoleH = 44;

  // Row 1: EDA + optional IDS/EFC shifted to the right
  const edaRowY = consoleY + consoleH + gapY;
  const sideNodes = [...ids, ...efc]; // IDS then EFC
  const edaCount = sensor ? 1 : 0;
  const row1Count = edaCount + sideNodes.length;

  // Row 2: ETAs
  const etaRowY = edaRowY + nodeH + gapY;
  // Row 3: ESUs
  const esuRowY = etaRowY + nodeH + gapY;

  const esusByHost = new Map();
  const orphanEsus = [];
  esuAssignments.forEach(assign => {
    if (assign.host.type === 'orphan') {
      orphanEsus.push(assign.esu);
      return;
    }
    const key = `${assign.host.type}:${formatTopologyInstanceName(assign.host.ref)}`;
    if (!esusByHost.has(key)) esusByHost.set(key, []);
    esusByHost.get(key).push(assign.esu);
  });

  const hostColumns = [];
  etas.forEach(eta => {
    hostColumns.push({ key: `eta:${formatTopologyInstanceName(eta)}`, host: eta, type: 'eta' });
  });
  if (sensor?.item.platform === 'all_in_one' && esusByHost.get(`aio:${formatTopologyInstanceName(sensor)}`)?.length) {
    hostColumns.push({ key: `aio:${formatTopologyInstanceName(sensor)}`, host: sensor, type: 'aio' });
  }
  if (orphanEsus.length) {
    hostColumns.push({ key: 'orphan', host: null, type: 'orphan' });
  }

  const esuColumnCounts = hostColumns.map(col => {
    if (col.type === 'orphan') return orphanEsus.length;
    return (esusByHost.get(col.key) || []).length;
  });

  const totalEsuSlots = esuColumnCounts.reduce((sum, count) => sum + Math.max(count, 1), 0);
  const esuGapBetweenGroups = hostColumns.length > 1 ? (hostColumns.length - 1) * gapX : 0;
  const row3ContentW = totalEsuSlots > 0
    ? totalEsuSlots * nodeW + Math.max(totalEsuSlots - hostColumns.length, 0) * gapX + esuGapBetweenGroups
    : 0;

  const maxPerRow = Math.max(1, row1Count, etas.length);
  const row1ContentW = row1Count * nodeW + Math.max(row1Count - 1, 0) * gapX;
  const row2ContentW = etas.length * nodeW + Math.max(etas.length - 1, 0) * gapX;
  const contentW = Math.max(row1ContentW, row2ContentW, row3ContentW);
  const w = Math.max(820, contentW + 80);

  // Only draw the ESU row if there are ESUs
  const hasEsuRow = esus.length > 0;
  const hasEtaRow = etas.length > 0;
  const height = (hasEsuRow ? esuRowY : hasEtaRow ? etaRowY : edaRowY) + nodeH + 32;

  let svg = `<svg viewBox="0 0 ${w} ${height}" class="diagram-svg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="eh-grad" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#261F63"/>
        <stop offset="100%" stop-color="#7F2854"/>
      </linearGradient>
      <filter id="eh-shadow" x="-10%" y="-10%" width="120%" height="130%">
        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#261F63" flood-opacity="0.18"/>
      </filter>
    </defs>
    <rect x="0" y="0" width="${w}" height="${height}" fill="#FAFAFC" rx="10"/>
  `;

  // Row labels (left gutter)
  const labelX = 18;
  svg += `<text x="${labelX}" y="${consoleY + 28}" font-family="Source Sans 3" font-weight="800" font-size="9.5" fill="#898A8D" letter-spacing="1.4">INFRA</text>`;
  svg += `<text x="${labelX}" y="${edaRowY + nodeH/2 + 4}" font-family="Source Sans 3" font-weight="800" font-size="9.5" fill="#898A8D" letter-spacing="1.4">SENSOR</text>`;
  if (hasEtaRow) svg += `<text x="${labelX}" y="${etaRowY + nodeH/2 + 4}" font-family="Source Sans 3" font-weight="800" font-size="9.5" fill="#898A8D" letter-spacing="1.4">PCAP</text>`;
  if (hasEsuRow) svg += `<text x="${labelX}" y="${esuRowY + nodeH/2 + 4}" font-family="Source Sans 3" font-weight="800" font-size="9.5" fill="#898A8D" letter-spacing="1.4">STORAGE</text>`;

  // Row 0 — Console (symbolic "ExtraHop Console")
  const consoleW = 200;
  const consoleX = (w - consoleW) / 2;
  svg += `
    <g transform="translate(${consoleX}, ${consoleY})">
      <rect x="0" y="0" width="${consoleW}" height="${consoleH}" rx="12" fill="url(#eh-grad)" filter="url(#eh-shadow)"/>
      <text x="${consoleW/2}" y="20" text-anchor="middle" font-family="Source Sans 3" font-weight="900" font-size="12" fill="white" letter-spacing="1.4">EXTRAHOP CONSOLE</text>
    </g>
  `;
  const consoleAnchor = { x: consoleX + consoleW/2, y: consoleY + consoleH };

  // Row 1 — EDA + side (IDS/EFC)
  // Center the EDA; place side nodes shifted right
  const row1Total = row1Count * nodeW + (row1Count - 1) * gapX;
  const row1StartX = (w - row1Total) / 2;

  const row1Positions = []; // {inst, kind: 'sensor'|'ids'|'efc', x, y}
  let cursor = row1StartX;
  if (sensor) {
    row1Positions.push({ inst: sensor, kind: 'sensor', x: cursor, y: edaRowY });
    cursor += nodeW + gapX;
  }
  for (const idsInst of ids) {
    row1Positions.push({ inst: idsInst, kind: 'ids', x: cursor, y: edaRowY });
    cursor += nodeW + gapX;
  }
  for (const efcInst of efc) {
    row1Positions.push({ inst: efcInst, kind: 'efc', x: cursor, y: edaRowY });
    cursor += nodeW + gapX;
  }

  // Draw Console → row1 cables
  for (const p of row1Positions) {
    const accent = colorForPlatform(p.inst.item.platform);
    const top = { x: p.x + nodeW/2, y: p.y };
    svg += drawCable(consoleAnchor, top, { color: accent });
  }

  // Draw row1 nodes
  for (const p of row1Positions) {
    const it = p.inst.item;
    const accent = colorForPlatform(it.platform);
    const ribbon =
      p.kind === 'sensor'
        ? (it.platform === 'all_in_one' ? 'AIO' : 'EDA')
        : p.kind === 'ids' ? 'IDS'
        : 'EFC';
    const sub = [];
    if (it.performance?.base_gbps) sub.push(`${it.performance.base_gbps} Gbps`);
    const kind = deploymentKind(it);
    if (kind === 'Physical' && it.form_factor?.rack_units) sub.push(`${it.form_factor.rack_units}U`);
    if (kind !== 'Physical') sub.push(kind);
    svg += renderAppNode(p.x, p.y, nodeW, nodeH, {
      title: it.name,
      subtitle: sub.join(' · '),
      accent, ribbon,
    });
  }

  // Row 2 — ETAs centered under the EDA
  const etaPositions = new Map();
  if (hasEtaRow) {
    const row2Total = etas.length * nodeW + (etas.length - 1) * gapX;
    const row2StartX = (w - row2Total) / 2;
    etas.forEach((eta, i) => {
      const x = row2StartX + i * (nodeW + gapX);
      etaPositions.set(eta, { x, y: etaRowY });

      // Cable from EDA to ETA
      if (sensor) {
        const sensorPos = row1Positions.find(p => p.kind === 'sensor');
        const from = { x: sensorPos.x + nodeW/2, y: sensorPos.y + nodeH };
        const to = { x: x + nodeW/2, y: etaRowY };
        svg += drawCable(from, to, { color: colorForPlatform('packetstore') });
      }

      const it = eta.item;
      const sub = [];
      if (it.performance?.base_gbps) sub.push(`${it.performance.base_gbps} Gbps`);
      const kind = deploymentKind(it);
      if (kind === 'Physical' && it.form_factor?.rack_units) sub.push(`${it.form_factor.rack_units}U`);
      if (kind !== 'Physical') sub.push(kind);
      svg += renderAppNode(x, etaRowY, nodeW, nodeH, {
        title: formatTopologyInstanceName(eta),
        subtitle: sub.join(' · '),
        accent: colorForPlatform('packetstore'),
        ribbon: 'ETA',
      });
    });
  }

  // Row 3 — ESUs placed under their assigned host to avoid crossing cables
  if (hasEsuRow) {
    const row3StartX = (w - row3ContentW) / 2;
    let colCursor = row3StartX;

    hostColumns.forEach(column => {
      const columnEsus = column.type === 'orphan'
        ? orphanEsus
        : (esusByHost.get(column.key) || []);
      const slotCount = Math.max(columnEsus.length, 1);
      const columnWidth = slotCount * nodeW + Math.max(slotCount - 1, 0) * gapX;

      columnEsus.forEach((esu, index) => {
        const x = colCursor + index * (nodeW + gapX);
        const y = esuRowY;

        let from = null;
        let dashed = false;
        let color = colorForPlatform('extended_storage');

        if (column.type === 'eta') {
          const pos = etaPositions.get(column.host);
          if (pos) from = { x: pos.x + nodeW/2, y: pos.y + nodeH };
        } else if (column.type === 'aio') {
          const sensorPos = row1Positions.find(p => p.kind === 'sensor');
          if (sensorPos) from = { x: sensorPos.x + nodeW/2, y: sensorPos.y + nodeH };
          color = colorForPlatform('all_in_one');
        } else {
          dashed = true;
        }

        const to = { x: x + nodeW/2, y };
        if (from) svg += drawCable(from, to, { color, dashed });

        const it = esu.item;
        const cap = computeStorageCapacityTb(it);
        const sub = cap ? `${cap} TB` : '';
        svg += renderAppNode(x, y, nodeW, nodeH, {
          title: formatTopologyInstanceName(esu),
          subtitle: sub || (column.type === 'orphan' ? 'Unattached' : ''),
          accent: colorForPlatform('extended_storage'),
          ribbon: 'ESU',
          dim: column.type === 'orphan',
        });
      });

      colCursor += columnWidth + gapX;
    });
  }

  svg += `</svg>`;
  return svg;
}

function openExport() {
  $('#export-content').innerHTML = buildExportContent();
  $('#export-backdrop').classList.add('open');
}

function closeExport() {
  $('#export-backdrop').classList.remove('open');
}

function downloadExport() {
  const content = $('#export-root').outerHTML;
  // Inline basic styles for stand-alone doc
  const styles = `
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700;800;900&display=swap');
      body { font-family: 'Source Sans 3', Arial, sans-serif; color: #15103A; background: #FAFAFC; margin: 0; padding: 24px; }
      .export-root { background: white; padding: 42px 56px; max-width: 860px; margin: 0 auto; font-size: 13.5px; line-height: 1.5; border: 1px solid #E3E1EC; border-radius: 16px; box-shadow: 0 10px 40px -10px rgba(21,16,58,0.2); }
      .export-head { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #261F63; padding-bottom: 14px; margin-bottom: 20px; }
      .export-head .brand { display: flex; align-items: center; gap: 12px; }
      .export-head h1 { font-size: 24px; font-weight: 900; margin: 0; color: #261F63; letter-spacing: -0.01em; }
      .export-head .stack-meta { text-align: right; font-size: 11px; color: #6B6880; text-transform: uppercase; letter-spacing: 0.08em; }
      .export-lozenge { background: linear-gradient(135deg, #261F63 0%, #7F2854 100%); color: white; padding: 14px 22px; border-radius: 999px; display: inline-flex; align-items: center; gap: 14px; margin-bottom: 18px; }
      .export-lozenge .x-name { font-size: 22px; font-weight: 900; }
      .export-lozenge .x-sep { width: 1px; height: 22px; background: rgba(255,255,255,0.5); }
      .export-lozenge .x-summary { font-size: 12px; letter-spacing: 0.04em; text-transform: uppercase; font-weight: 600; opacity: 0.9; }
      .export-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
      .export-stat { border: 1.5px solid #261F63; padding: 10px 14px; border-radius: 8px; }
      .export-stat .xs-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: #6B6880; font-weight: 700; }
      .export-stat .xs-value { font-size: 20px; font-weight: 900; color: #261F63; margin-top: 2px; }
      .export-stat .xs-value .unit { font-size: 10px; font-weight: 500; color: #6B6880; margin-left: 3px; }
      .export-section { margin-bottom: 18px; }
      .export-section h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.16em; color: #7F2854; font-weight: 800; margin: 0 0 8px; padding-bottom: 5px; border-bottom: 1px solid #E3E1EC; }
      .export-list { list-style: none; padding: 0; margin: 0; }
      .export-list li { display: flex; justify-content: space-between; gap: 14px; padding: 7px 10px; border-left: 3px solid var(--plt-color, #261F63); margin-bottom: 4px; background: #FAFAFC; border-radius: 0 4px 4px 0; font-size: 13px; }
      .export-list li .xl-left { font-weight: 700; color: #15103A; }
      .export-list li .xl-tag { font-size: 10px; padding: 1px 7px; border-radius: 999px; background: rgba(38,31,99,0.1); color: #261F63; text-transform: uppercase; letter-spacing: 0.04em; font-weight: 700; margin-left: 4px; }

  const doc = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${state.stackName || 'ExtraHop Stack'} — One-Pager</title>${styles}</head><body>${content}</body></html>`;

  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const fn = (state.stackName?.trim() || 'extrahop-stack').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'extrahop-stack';
  a.href = url;
  a.download = `${fn}-onepager.html`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function printExport() {
  // Print only the export root
  const content = $('#export-content').innerHTML;
  const w = window.open('', '_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>${state.stackName || 'ExtraHop Stack'}</title><link rel="stylesheet" href="data:text/css," />`);
  w.document.write(`<style>
    @import url('https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700;800;900&display=swap');
    body { font-family: 'Source Sans 3', Arial, sans-serif; color: #15103A; margin: 0; padding: 0; }
    ${document.querySelector('style').innerHTML}
    @media print { body { background: white; } .export-root { padding: 0; max-width: none; } }
  </style></head><body>${content}<script>window.onload=()=>{setTimeout(()=>window.print(),400)}<\/script></body></html>`);
  w.document.close();
}

/* ============================================================
   Wire-up
   ============================================================ */

// Search
$('#search').addEventListener('input', (e) => {
  state.search = e.target.value;
  renderActiveFilters();
  render();
});
// Sort
$('#sort').addEventListener('change', (e) => { state.sort = e.target.value; render(); });

// Stack actions
$('#clear-stack').addEventListener('click', () => {
  if (!state.stack.length) return;
  if (confirm('Clear the current stack?')) clearStack();
});
$('#save-stack').addEventListener('click', () => {
  persistStack();
  const btn = $('#save-stack');
  const orig = btn.innerHTML;
  btn.innerHTML = `<svg class="i" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Saved`;
  setTimeout(() => { btn.innerHTML = orig; }, 1200);
});
$('#export-stack').addEventListener('click', openExport);
$('#stack-name').addEventListener('input', (e) => { state.stackName = e.target.value; persistStack(); });
$('#stack-notes').addEventListener('input', (e) => { state.stackNotes = e.target.value; persistStack(); });

// Drawer (narrow viewports)
$('#stack-fab')?.addEventListener('click', toggleDrawer);
$('#stack-scrim')?.addEventListener('click', closeDrawer);
$('#drawer-close')?.addEventListener('click', closeDrawer);

// Close the drawer when clicking outside if somehow opened
window.addEventListener('resize', () => {
  if (!isDrawerMode()) closeDrawer();
});

// EOS toggle
const eosToggle = $('#hide-eos-toggle');
if (eosToggle) {
  eosToggle.checked = !!state.hideEos;
  eosToggle.addEventListener('change', () => {
    state.hideEos = !!eosToggle.checked;
    try { localStorage.setItem('eh-hide-eos', state.hideEos ? '1' : '0'); } catch (e) { /* ignore */ }
    render();
  });
}

// Modal
$('#modal-close-btn').addEventListener('click', closeDetail);
$('#modal-backdrop').addEventListener('click', (e) => {
  if (e.target === $('#modal-backdrop')) closeDetail();
});
$('#modal-add-btn').addEventListener('click', () => {
  if (activeDetailItem) addToStack(activeDetailItem.name);
  closeDetail();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') { closeDetail(); closeExport(); }
});

// Export modal
$('#export-close-btn').addEventListener('click', closeExport);
$('#export-backdrop').addEventListener('click', (e) => {
  if (e.target === $('#export-backdrop')) closeExport();
});
$('#export-print-btn').addEventListener('click', printExport);
$('#export-download-btn').addEventListener('click', downloadExport);

// ---- Init ----
async function bootstrapCatalog() {
  // Try the external JSON file first so the catalog can be updated without editing the HTML.
  try {
    const res = await fetch('catalog.eh.json', { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!Array.isArray(data)) throw new Error('catalog.eh.json is not an array');
    CATALOG = data;
  } catch (err) {
    console.warn('[catalog] fetch of catalog.eh.json failed, falling back to inline data:', err);
    try {
      CATALOG = JSON.parse(document.getElementById('catalog-json').textContent);
    } catch (e2) {
      console.error('[catalog] inline fallback also failed:', e2);
      CATALOG = [];
    }
  }
  // Drop any stack entries that reference items no longer in the catalog.
  if (Array.isArray(state.stack)) {
    state.stack = state.stack.filter(e => CATALOG.some(x => x.name === e.id));
  }
  buildFilterPopovers();
  renderActiveFilters();
  render();
  renderStack();
  updateFabCount();
}
bootstrapCatalog();

// Drawer-close button only meaningful in drawer mode
function syncDrawerCloseVisibility() {
  const btn = document.getElementById('drawer-close');
  if (!btn) return;
  btn.style.display = isDrawerMode() ? '' : 'none';
}
syncDrawerCloseVisibility();
window.addEventListener('resize', syncDrawerCloseVisibility);

// Keep --eh-header-h in sync with the live header height so sticky offsets stay correct
function syncHeaderHeight() {
  const hdr = document.getElementById('site-header');
  if (!hdr) return;
  const h = Math.ceil(hdr.getBoundingClientRect().height);
  document.documentElement.style.setProperty('--eh-header-h', h + 'px');
}
syncHeaderHeight();
window.addEventListener('resize', syncHeaderHeight);
if (typeof ResizeObserver !== 'undefined') {
  const ro = new ResizeObserver(syncHeaderHeight);
  const hdrEl = document.getElementById('site-header');
  if (hdrEl) ro.observe(hdrEl);
}
